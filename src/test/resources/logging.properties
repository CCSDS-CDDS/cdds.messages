# Root logger
handlers = java.util.logging.ConsoleHandler
.level = INFO 

# Console handler
java.util.logging.ConsoleHandler.level = ALL
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# Custom format (includes thread ID)
java.util.logging.SimpleFormatter.format=%1$tF %1$tT [%4$s] [thread-%7$d] %2$s - %5$s %6$s%n

# Your logger (optional but clean)
cdds.tc.user.level = ALL